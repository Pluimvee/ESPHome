# Resideo base config - included via packages by each resideo-*.yaml
# Required substitutions: device_id, build_root, friendly_name, temp_offset, humidity_offset

esphome:
  name: ${device_id}
  build_path: ${build_root}/${device_id}
  friendly_name: ${friendly_name}
  project:
    name: 'EcoGrid.Climate Monitor (Resideo mod)'
    version: ${version}

esp8266:
  board: esp12e
  restore_from_flash: false

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "Resideo"
    password: !secret wifi_ap_password

captive_portal:

web_server:
  port: 80
  version: 3

logger:
  level: INFO
  baud_rate: 0

uart:
  baud_rate: 9600
  rx_pin: GPIO3

external_components:
  - source: github://Pluimvee/esphome-resideo
    refresh: 5min
    components: [cht8305_sniffer, cm1106_sniffer]

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    update_interval: 60s
    icon: "mdi:wifi"

  - platform: cht8305_sniffer
    temperature:
      name: "Temperature"
      filters:
        - offset: ${temp_offset}
        - lambda: |-
            if (x < 0.0f || x > 40.0f) return NAN;
            return x;
        - filter_out: nan
    humidity:
      name: "Humidity"
      filters:
        - offset: ${humidity_offset}

  - platform: cm1106_sniffer
    name: "Carbon-dioxide"
