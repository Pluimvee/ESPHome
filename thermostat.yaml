      device_class: pressure
      state_class: measurement

  # Berekend aanvoerwater setpoint (verwarmingscurve uit HeatingCurve.cpp)
  #
  # Setpoint = target + factor * curve
  #   factor  = clamp(factorA + factorB * delta_inside, 0, W55=1.175)
  #   curve   = delta_outside  (of kwadratisch indien factorC > 0)
  #   delta_outside = target - outside
  #   delta_inside  = target - inside
  #
  - platform: template
    name: Water Setpoint
    id: st_setpoint_temp
    unit_of_measurement: "Г‚В°C"
    device_class: temperature
    state_class: measurement
    update_interval: 10s
    lambda: |-
      float inside  = id(st_room_temp).state;
      float outside = id(st_outside_temp).state;
      float target  = id(target_temp_number).state;

      if (isnan(inside) || isnan(outside) || isnan(target))
        return NAN;

      float factorA = id(factor_a_number).state;
      float factorB = id(factor_b_number).state;
      float factorC = id(factor_c_number).state;

      float delta_outside = target - outside;
      float delta_inside  = target - inside;

      // Factor berekening (zie HeatingCurve::calculate)
      float factor = factorB * delta_inside;
      if (delta_outside < 0.0f) factor *= -1.0f;
      if (factor < 0.0f) factor = 0.0f;
      factor += factorA;
      if (factor > 1.175f) factor = 1.175f;   // W55 stooklijn maximum

      // Curve (lineair of kwadratisch)
      float curve = delta_outside;
      if (factorC > 0.0f)
        curve = factorC / target * powf(delta_outside, 2.0f)
              + (1.0f - factorC) * delta_outside;

      float sp = target + factor * curve;

      // Stuur 0 naar ketel wanneer verwarming en koeling uit zijn
      if (!id(ch_enabled_g) && !id(cooling_enabled_g))
        return 0.0f;

      return sp;
    on_value:
      then:
        # Setpunttrend bijhouden (voor schakellogica)
        - lambda: |-
            float prev = id(setpoint_prev);
            id(setpoint_trend_g) = isnan(prev) ? 0.0f : x - prev;
            id(setpoint_prev) = x;
        # LVGL bijwerken
        - lvgl.label.update:
            id: lbl_setpoint
            text:
              format: "%.1fГ‚В°"
              args: [x]
        - lvgl.label.update:
            id: lbl_boiler_setpoint
            text:
              format: "%.1fГ‚В°"
              args: [x]
        # OT: aanvoerwater setpoint doorsturen (0..55 ГўвЂ вЂ™ 0..1)
        - output.set_level:
            id: ot_t_set_output
            level: !lambda "return (isnan(x) || x <= 0.0f) ? 0.0f : x / 55.0f;"

  # Setpunttrend beschikbaar in HA voor monitoring
  - platform: template
    name: Setpoint Trend
    id: st_setpoint_trend
    unit_of_measurement: "Г‚В°C/10s"
    state_class: measurement
    update_interval: 10s
    lambda: "return id(setpoint_trend_g);"

# ГўвЂќв‚¬ГўвЂќв‚¬ Binary sensors ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
binary_sensor:
  - platform: opentherm
    fault_indication:
      name: Boiler Fault
      id: ot_fault
      on_state:
        then:
          - lvgl.label.update:
              id: lbl_ot_fault
              text: !lambda 'return x ? "ERR" : "OT";'
          - lvgl.label.update:
              id: lbl_status_ot
              text: !lambda 'return x ? "FOUT" : "Nee";'
    ch_active:
      name: Boiler CH Active
      id: ot_ch_active
      on_state:
        then:
          - lvgl.label.update:
              id: lbl_status_ch
              text: !lambda 'return x ? "AAN" : "UIT";'
    dhw_active:
      name: Boiler DHW Active
      id: ot_dhw_active
    flame_on:
      name: Boiler Flame
      id: ot_flame
      on_state:
        then:
          - lvgl.label.update:
              id: lbl_flame
              text: !lambda 'return x ? "F" : "-";'
    cooling_active:
      name: Boiler Cooling Active
      id: ot_cooling_active
      on_state:
        then:
          - lvgl.label.update:
              id: lbl_status_cool
              text: !lambda 'return x ? "AAN" : "UIT";'

  # Status slimme regeling (afgeleid van globals)
  - platform: template
    name: Smart Heating Enabled
    id: smart_heating
    lambda: "return id(ch_enabled_g);"
  - platform: template
    name: Smart Cooling Enabled
    id: smart_cooling
    lambda: "return id(cooling_enabled_g);"

  # ГўвЂќв‚¬ГўвЂќв‚¬ Navigatieknoppen (actief LOW, 4k7 externe pull-up op module) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  - platform: gpio
    pin:
      number: GPIO32
      mode: { input: true, pullup: false }
      inverted: true
    id: btn_up
    name: "Button UP"
    internal: true
    filters:
      - delayed_on: 30ms
    on_press:
      then:
        - globals.set:
            id: last_interaction
            value: !lambda "return millis();"
        - if:
            condition:
              lambda: "return id(target_temp_number).state < 25.0f;"
            then:
              - number.increment:
                  id: target_temp_number
                  cycle: false

  - platform: gpio
    pin:
      number: GPIO33
      mode: { input: true, pullup: false }
      inverted: true
    id: btn_down
    name: "Button DOWN"
    internal: true
    filters:
      - delayed_on: 30ms
    on_press:
      then:
        - globals.set:
            id: last_interaction
            value: !lambda "return millis();"
        - if:
            condition:
              lambda: "return id(target_temp_number).state > 18.0f;"
            then:
              - number.decrement:
                  id: target_temp_number
                  cycle: false

  - platform: gpio
    pin:
      number: GPIO34    # input-only pin; externe pull-up vereist
      mode: { input: true, pullup: false }
      inverted: true
    id: btn_left
    name: "Button LEFT"
    internal: true
    filters:
      - delayed_on: 30ms
    on_press:
      then:
        - globals.set:
            id: last_interaction
            value: !lambda "return millis();"
        - lvgl.page.previous:

  - platform: gpio
    pin:
      number: GPIO35    # input-only pin; externe pull-up vereist
      mode: { input: true, pullup: false }
      inverted: true
    id: btn_right
    name: "Button RIGHT"
    internal: true
    filters:
      - delayed_on: 30ms
    on_press:
      then:
        - globals.set:
            id: last_interaction
            value: !lambda "return millis();"
        - lvgl.page.next:

# ГўвЂќв‚¬ГўвЂќв‚¬ OpenTherm schakelaars ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
switch:
