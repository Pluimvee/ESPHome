sensor:
  # Ruimtetemperatuur Гўв‚¬вЂњ DS18B20 (gang)
  - platform: dallas_temp
    one_wire_id: onewire_bus
    index: 0
    name: Room Temperature
    id: st_room_temp
    unit_of_measurement: "Г‚В°C"
    device_class: temperature
    state_class: measurement
    update_interval: 10s
    filters:
      - offset: -1.3
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
          send_first_at: 1
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_room
            text:
              format: "%.1fГ‚В°"
              args: [x]
        # OT: stuur huidige kamertemperatuur naar ketel (0..40 ГўвЂ вЂ™ 0..1)
        - output.set_level:
            id: ot_t_room_output
            level: !lambda "return isnan(x) ? 0.0f : x / 40.0f;"

  # OpenTherm ruwe meetwaarden
  - platform: opentherm
    t_outside:
      name: Outside Temperature
      id: st_outside_temp
      unit_of_measurement: "Г‚В°C"
      device_class: temperature
      state_class: measurement
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_outside
              text:
                format: "%.1fГ‚В°"
                args: [x]
    t_ret:
      name: Inlet Temperature
      id: st_inlet_temp
      unit_of_measurement: "Г‚В°C"
      device_class: temperature
      state_class: measurement
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_inlet
              text:
                format: "%.1fГ‚В°"
                args: [x]
          - lvgl.label.update:
              id: lbl_boiler_inlet
              text:
                format: "%.1fГ‚В°"
                args: [x]
    t_boiler:
      name: Outlet Temperature
      id: st_outlet_temp
      unit_of_measurement: "Г‚В°C"
      device_class: temperature
      state_class: measurement
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_boiler_outlet
              text:
                format: "%.1fГ‚В°"
                args: [x]
    rel_mod_level:
      name: Modulation Level
      id: ot_modulation
      unit_of_measurement: "%"
      state_class: measurement
      on_value:
        then:
          - lvgl.label.update:
