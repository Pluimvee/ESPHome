# Smart Thermostat Гўв‚¬вЂњ ESP32 WROOM + SSD1315 128ГѓвЂ”64 OLED (IГ‚ВІC) + 4 knoppen
# Regellogica (verwarmingscurve, antipendel) in native ESPHome YAML.

substitutions:
  device_id: thermostat
  device_name: Thermostat
  build_root: !secret build_root
  friendly_name: ${device_name}

packages:
  wifi: !include wifi.yaml
  version: !include version.yaml

esphome:
  name: ${device_id}
  friendly_name: ${friendly_name}
  comment: Thermostaat ESP32 Гўв‚¬вЂњ OpenTherm + OLED 128ГѓвЂ”64 LVGL + 4 knoppen
  project:
    name: 'EcoGrid.Thermostat'
    version: ${version}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    - lvgl.label.update:
        id: lbl_ha_status
        text: "H+"
    - lvgl.label.update:
        id: lbl_status_ha
        text: "verbonden"
  on_client_disconnected:
    - lvgl.label.update:
        id: lbl_ha_status
        text: "H-"
    - lvgl.label.update:
        id: lbl_status_ha
        text: "offline"

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time

preferences:
  flash_write_interval: 60s

# ГўвЂќв‚¬ГўвЂќв‚¬ Hardware ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: false   # zet op true bij eerste boot om IГ‚ВІC-adres te zoeken

one_wire:
  - platform: gpio
    pin: GPIO25
    id: onewire_bus

opentherm:
  in_pin: GPIO17
  out_pin: GPIO16
  sync_mode: true

# ГўвЂќв‚¬ГўвЂќв‚¬ Fonts voor LVGL (bpp:1 = geen anti-aliasing, ideaal voor monochrome OLED) ГўвЂќв‚¬ГўвЂќв‚¬
font:
  - file: "gfonts://Roboto"
    id: font_s        # 8 pt Гўв‚¬вЂњ labels, statusbalk, header
    size: 8
    bpp: 1
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~Г‚В°%+"
  - file: "gfonts://Roboto"
    id: font_m        # 12 pt Гўв‚¬вЂњ temperatuurwaarden op overzichtscherm
    size: 12
    bpp: 1
    glyphs: " 0123456789.-Г‚В°C%nNaA/"
  - file: "gfonts://Roboto"
    id: font_l        # 18 pt Гўв‚¬вЂњ grote doeltemperatuur op instelscherm
    size: 18
    bpp: 1
    glyphs: " 0123456789.-Г‚В°C"

# ГўвЂќв‚¬ГўвЂќв‚¬ Globals ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
globals:
  # Schakelstatus verwarmingssysteem
  - id: ch_enabled_g
    type: bool
    restore_value: false
    initial_value: "false"
  - id: cooling_enabled_g
    type: bool
    restore_value: false
    initial_value: "false"
  # Antipendel Гўв‚¬вЂњ tijdstip laatste schakelactie (ms)
  - id: last_switch_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Setpunttrend: verschil t.o.v. vorige cyclus (voor schakellogica)
  - id: setpoint_prev
    type: float
    restore_value: false
    initial_value: "NAN"
  - id: setpoint_trend_g
    type: float
    restore_value: false
    initial_value: "0.0"
  # Scherm-timeout
  - id: last_interaction
    type: uint32_t
    restore_value: false
    initial_value: "0"

# ГўвЂќв‚¬ГўвЂќв‚¬ Display (raw driver Гўв‚¬вЂњ LVGL beheert rendering) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: thermostat_display
    update_interval: never

# ГўвЂќв‚¬ГўвЂќв‚¬ LVGL Гўв‚¬вЂњ 4 pagina's ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
lvgl:
  displays:
    - thermostat_display
  default_font: font_s

  pages:
    # ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ
    # Pagina 0 Гўв‚¬вЂќ Home / overzicht  (standaard na 30 s timeout)
    # Gele zone hardware = y 0Гўв‚¬вЂњ15; blauwe zone = y 16Гўв‚¬вЂњ63
    # ГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђГўвЂўВђ
    - id: page_home
      widgets:
        # Statusbalk (geel)
        - label:
            id: lbl_time
            x: 0
            y: 4
            text: "--:--"
        - label:
            id: lbl_wifi_status
            x: 55
            y: 4
            text: "W?"
        - label:
            id: lbl_ha_status
            x: 75
            y: 4
            text: "H?"
        - label:
            id: lbl_ot_fault
            x: 92
            y: 4
            text: "OT"
        - label:
            id: lbl_flame
