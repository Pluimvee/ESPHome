# ГўвЂќв‚¬ГўвЂќв‚¬ OpenTherm float outputs ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
output:
  - platform: opentherm
    t_set:
      id: ot_t_set_output
      min_value: 0
      max_value: 55
      zero_means_zero: true
    t_room_set:
      id: ot_t_room_set_output
      min_value: 18
      max_value: 25
    t_room:
      id: ot_t_room_output
      min_value: 0
      max_value: 40

# ГўвЂќв‚¬ГўвЂќв‚¬ Instelbare parameters ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
number:
  - platform: template
    name: Target Temperature
    id: target_temp_number
    min_value: 18.0
    max_value: 25.0
    step: 0.5          # 0,5 Г‚В°C per knopdruk
    restore_value: true
    optimistic: true
    initial_value: 21.0
    unit_of_measurement: "Г‚В°C"
    device_class: temperature
    set_action:
      then:
        # LVGL labels bijwerken
        - lvgl.label.update:
            id: lbl_target_home
            text:
              format: "%.1fГ‚В°"
              args: [x]
        - lvgl.label.update:
            id: lbl_target_large
            text:
              format: "%.1f"
              args: [x]
        # OT: kamersetpunt doorsturen (18..25 ГўвЂ вЂ™ 0..1)
        - output.set_level:
            id: ot_t_room_set_output
            level: !lambda "return (x - 18.0f) / 7.0f;"

  - platform: template
    name: Heating Curve Factor A   # basisverwarmingsvraag (buiten-gebaseerd)
    id: factor_a_number
    min_value: 0.0
    max_value: 1.5
    step: 0.05
    restore_value: true
    optimistic: true
    initial_value: 0.65   # default uit originele HeatingCurve.cpp

  - platform: template
    name: Heating Curve Factor B   # correctie o.b.v. kamertemperatuur
    id: factor_b_number
    min_value: 0.0
    max_value: 1.5
    step: 0.05
    restore_value: true
    optimistic: true
    initial_value: 0.20   # INSIDE_FACTOR uit originele code

  - platform: template
    name: Heating Curve Factor C   # kwadratisch curveaandeel
    id: factor_c_number
    min_value: 0.0
    max_value: 1.5
    step: 0.05
    restore_value: true
    optimistic: true
    initial_value: 0.00   # CURVE_FACTOR uit originele code (lineair)

# ГўвЂќв‚¬ГўвЂќв‚¬ Interval ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
interval:
  # Klokupdate + scherm-timeout (elke 10 s)
  - interval: 10s
    then:
      - if:
          condition:
            lambda: "return id(ha_time).now().is_valid();"
          then:
            - lvgl.label.update:
                id: lbl_time
                text: !lambda |-
                  auto t = id(ha_time).now();
                  char buf[6];
                  t.strftime(buf, sizeof(buf), "%H:%M");
                  return std::string(buf);
      - if:
          condition:
            lambda: "return id(last_interaction) > 0 && (millis() - id(last_interaction)) > 30000UL;"
          then:
            - globals.set:
                id: last_interaction
                value: "0"
            - lvgl.page.show:
                id: page_home

  # Slimme schakellogica (elke 10 s) Гўв‚¬вЂњ geport vanuit SmartControl::set_operating_mode()
  #
  # Antipendel: geen schakelactie binnen 30 minuten na laatste actie.
  # Verwarming AAN: 2 * setpunttrend > (Tkamer - Tdoel)
  #                 = "zet verwarming aan vГѓВіГѓВіrdat de kamer te koud wordt"
  # Verwarming UIT: aanvoerwater (retour) heeft setpunt bereikt
  # Koeling AAN/UIT: eenvoudige hysterese op 25 Г‚В°C
  #
  - interval: 10s
    then:
      - lambda: |-
          const uint32_t ANTIPENDEL_MS = 30UL * 60UL * 1000UL;
          if ((millis() - id(last_switch_ms)) < ANTIPENDEL_MS)
            return;

          float inside  = id(st_room_temp).state;
          float outside = id(st_outside_temp).state;
          float target  = id(target_temp_number).state;
          float sp      = id(st_setpoint_temp).state;
          float inlet   = id(st_inlet_temp).state;
          float trend   = id(setpoint_trend_g);

          if (isnan(inside) || isnan(target)) return;

          // ГўвЂќв‚¬ГўвЂќв‚¬ Koeling AAN ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
          if (!id(cooling_enabled_g)
              && inside  > 25.0f
              && !isnan(outside) && outside > 25.0f) {
            id(cooling_enabled_g) = true;
            id(ot_cooling_enable).turn_on();
            id(last_switch_ms) = millis();
            return;
          }
          // ГўвЂќв‚¬ГўвЂќв‚¬ Koeling UIT ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
          if (id(cooling_enabled_g) && inside < 25.0f) {
            id(cooling_enabled_g) = false;
            id(ot_cooling_enable).turn_off();
            id(last_switch_ms) = millis();
            return;
          }
          // ГўвЂќв‚¬ГўвЂќв‚¬ Verwarming AAN ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
          if (!id(ch_enabled_g) && inside < 25.0f && !isnan(sp)) {
            float error = roundf(10.0f * (inside - target)) / 10.0f;
            if (2.0f * trend > error) {
              id(ch_enabled_g) = true;
              id(ot_ch_enable).turn_on();
              id(last_switch_ms) = millis();
            }
            return;
          }
          // ГўвЂќв‚¬ГўвЂќв‚¬ Verwarming UIT ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
          if (id(ch_enabled_g) && !isnan(inlet) && !isnan(sp) && sp > 0.0f) {
            float r_inlet = roundf(10.0f * inlet) / 10.0f;
            float r_sp    = roundf(10.0f * sp)    / 10.0f;
            if (r_inlet - r_sp > 0.1f) {
              id(ch_enabled_g) = false;
              id(ot_ch_enable).turn_off();
              id(last_switch_ms) = millis();
            }
          }

# ГўвЂќв‚¬ГўвЂќв‚¬ Status LED ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
status_led:
  pin: GPIO2
