# Copyright (c) 2026 Pluimvee
# SDM630 energy meter reader via Modbus RTU

substitutions:
  device_id: sdm630
  build_root: !secret build_root
  friendly_name: SDM630 Energy Meter

packages:
  wifi: !include wifi.yaml
  version: !include version.yaml

esphome:
  name: ${device_id}
  build_path: ${build_root}/${device_id}
  friendly_name: ${friendly_name}
  project:
    name: 'EcoGrid.SDM630 Reader'
    version: ${version}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0
  logs:
    uart: WARN
    sensor: WARN
    modbus_controller.sensor: WARN

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

mdns:
  disabled: false

web_server:
  port: 80
  version: 3

uart:
  - id: uart_rs485
    rx_pin: GPIO16
    tx_pin: GPIO17
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 512

modbus:
  - id: modbus1
    uart_id: uart_rs485

modbus_controller:
  - id: sdm630
    address: 1          # SDM630 default Modbus address
    modbus_id: modbus1
    update_interval: 1s
    setup_priority: -10

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    icon: "mdi:wifi"
    update_interval: 60s

  # All SDM630 registers 0x0000–0x004A are read in a single FC04 request (76 registers)
  # by keeping them contiguous. Internal sensors fill gaps that aren't needed.

  # --- Voltage (0x0000–0x0004) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Voltage L1"
    id: voltage_l1
    register_type: read
    address: 0x0000
    value_type: FP32
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Voltage L2"
    id: voltage_l2
    register_type: read
    address: 0x0002
    value_type: FP32
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Voltage L3"
    id: voltage_l3
    register_type: read
    address: 0x0004
    value_type: FP32
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1

  # --- Current (0x0006–0x000A) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Current L1"
    id: current_l1
    register_type: read
    address: 0x0006
    value_type: FP32
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Current L2"
    id: current_l2
    register_type: read
    address: 0x0008
    value_type: FP32
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Current L3"
    id: current_l3
    register_type: read
    address: 0x000A
    value_type: FP32
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2

  # --- Active Power (0x000C–0x0010) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Active Power L1"
    id: power_l1
    register_type: read
    address: 0x000C
    value_type: FP32
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Active Power L2"
    id: power_l2
    register_type: read
    address: 0x000E
    value_type: FP32
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Active Power L3"
    id: power_l3
    register_type: read
    address: 0x0010
    value_type: FP32
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # --- Apparent Power (0x0012–0x0016) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Apparent Power L1"
    register_type: read
    address: 0x0012
    value_type: FP32
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Apparent Power L2"
    register_type: read
    address: 0x0014
    value_type: FP32
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Apparent Power L3"
    register_type: read
    address: 0x0016
    value_type: FP32
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    accuracy_decimals: 0

  # --- Reactive Power (0x0018–0x001C) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Reactive Power L1"
    register_type: read
    address: 0x0018
    value_type: FP32
    unit_of_measurement: "VAr"
    device_class: reactive_power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Reactive Power L2"
    register_type: read
    address: 0x001A
    value_type: FP32
    unit_of_measurement: "VAr"
    device_class: reactive_power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Reactive Power L3"
    register_type: read
    address: 0x001C
    value_type: FP32
    unit_of_measurement: "VAr"
    device_class: reactive_power
    state_class: measurement
    accuracy_decimals: 0

  # --- Power Factor (0x001E–0x0022) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Power Factor L1"
    register_type: read
    address: 0x001E
    value_type: FP32
    unit_of_measurement: ""
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Power Factor L2"
    register_type: read
    address: 0x0020
    value_type: FP32
    unit_of_measurement: ""
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Power Factor L3"
    register_type: read
    address: 0x0022
    value_type: FP32
    unit_of_measurement: ""
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3

  # --- Gap fillers: phase angles + averages (0x0024–0x0032, internal) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Phase Angle L1"
    register_type: read
    address: 0x0024
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Phase Angle L2"
    register_type: read
    address: 0x0026
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Phase Angle L3"
    register_type: read
    address: 0x0028
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Avg Line-to-Neutral Volts"
    register_type: read
    address: 0x002A
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Avg Line Current"
    register_type: read
    address: 0x002C
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Sum Line Currents"
    register_type: read
    address: 0x002E
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Total System Power Demand"
    register_type: read
    address: 0x0030
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Max Total System Power Demand"
    register_type: read
    address: 0x0032
    value_type: FP32

  # --- Totals (0x0034–0x003E) with two internal gap fillers ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Total Active Power"
    id: power_total
    register_type: read
    address: 0x0034
    value_type: FP32
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Neutral Current Demand"
    register_type: read
    address: 0x0036
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Total Apparent Power"
    id: apparent_power_total
    register_type: read
    address: 0x0038
    value_type: FP32
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Max Neutral Current"
    register_type: read
    address: 0x003A
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Total Reactive Power"
    id: reactive_power_total
    register_type: read
    address: 0x003C
    value_type: FP32
    unit_of_measurement: "VAr"
    device_class: reactive_power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Total Power Factor"
    register_type: read
    address: 0x003E
    value_type: FP32
    unit_of_measurement: ""
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3

  # --- Gap fillers before frequency (0x0040–0x0044, internal) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Total Phase Angle"
    register_type: read
    address: 0x0040
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Import Active Power Demand"
    register_type: read
    address: 0x0042
    value_type: FP32

  - platform: modbus_controller
    modbus_controller_id: sdm630
    internal: true
    name: "Max Import Active Power Demand"
    register_type: read
    address: 0x0044
    value_type: FP32

  # --- Frequency + Energy (0x0046–0x004A) ---
  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Frequency"
    register_type: read
    address: 0x0046
    value_type: FP32
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Import Active Energy"
    id: energy_import
    register_type: read
    address: 0x0048
    value_type: FP32
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: sdm630
    name: "Export Active Energy"
    id: energy_export
    register_type: read
    address: 0x004A
    value_type: FP32
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
